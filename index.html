<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Заглавная</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #f5f5f5;
    color: #222;
}

header {
    padding: 20px;
    background: white;
    border-bottom: 1px solid #ddd;
    font-size: 24px;
    font-weight: 700;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.sync-button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
}

.sync-button:hover {
    opacity: 0.9;
}

.container {
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
}

.search {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: 1px solid #ddd;
    font-size: 18px;
    box-sizing: border-box;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
    margin-top: 30px;
}

.card {
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.card h3 {
    margin-top:0;
}

a {
    display:block;
    padding:8px 0;
    color:#2563eb;
    text-decoration:none;
}

a:hover {
    text-decoration:underline;
}

</style>

</head>


<body>


<header>

<div>
🚀 Заглавная
</div>


<button class="sync-button" onclick="loginYandex()">
☁ Синхронизировать
</button>


</header>



<div class="container">


<input class="search" placeholder="Поиск...">


<div class="grid">



<div class="card">
<h3>👤 Личное</h3>

<a href="https://telegram.org">Telegram</a>
<a href="https://mail.yandex.ru">Почта</a>
<a href="https://music.yandex.ru">Музыка</a>

</div>




<div class="card">
<h3>💼 Работа</h3>

<a href="https://www.avito.ru">Авито</a>
<a href="https://seller.ozon.ru">Ozon Seller</a>
<a href="https://seller.wildberries.ru">Wildberries</a>

</div>




<div class="card">
<h3>🏠 Семья</h3>

<a href="https://www.gosuslugi.ru">Госуслуги</a>
<a href="https://www.mos.ru">Mos.ru</a>

</div>




<div class="card">
<h3>📦 Селлер</h3>

<a href="https://mpstats.io">MPStats</a>
<a href="https://seller.ozon.ru">Ozon</a>

</div>



</div>


</div>



<script src="js/yandex-auth.js"></script>


</body>
</html>
